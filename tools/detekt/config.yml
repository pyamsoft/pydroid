naming:
  FunctionNaming:
    ignoreAnnotated:
      - "Composable"
  TopLevelPropertyNaming:
    constantPattern: "[A-Z][_A-Za-z0-9]*"

empty-blocks:
  EmptyFunctionBlock:
    ignoreAnnotated:
      - "LintIgnoreEmptyFunctionBlock"

exceptions:
  TooGenericExceptionCaught:
    ignoreAnnotated:
      - "LintIgnoreTooGenericExceptionCaught"
  TooGenericExceptionThrown:
    ignoreAnnotated:
      - "LintIgnoreTooGenericExceptionThrown"
  SwallowedException:
    ignoreAnnotated:
      - "LintIgnoreSwallowedException"

style:
  MagicNumber:
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotated:
      - "Preview"
      - "PreviewSource"
      - "LintIgnoreMagicNumber"
  UnusedPrivateFunction:
    ignoreAnnotated:
      - "Preview"
      - "PreviewSource"
  NewLineAtEndOfFile:
    active: false
  ReturnCount:
    active: false
  MaxLineLength:
    ignoreAnnotated:
      - "LintIgnoreMaxLineLength"

complexity:
  LongParameterList:
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - "PreviewSource"
  TooManyFunctions:
    ignoreAnnotated:
      - "Preview"
      - "PreviewSource"
      - "LintIgnoreTooManyFunctions"
  LongMethod:
    ignoreAnnotated:
      - "Composable"
      - "Preview"
      - "PreviewSource"
      - "LintIgnoreLongMethod"